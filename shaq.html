      <a class="logo" href="index.html">
        <span class="logo-mark">P4K</span>

  <section class="hero">
    <div class="wrap">
      <h1>The Shaq Collection</h1>
      <p class="hero-tag">chasing the cards that matter — and keeping every one.</p>
    </div>
  </section>

  <main class="wrap" id="collection">

    <div class="filter-bar">
      <button class="chip chip-active" data-filter="all">All Shaq Cards</button>
      <button class="chip" data-filter="international">International</button>
      <button class="chip" data-filter="graded">Graded</button>
      <button class="chip" data-filter="oddball">Oddballs</button>
      <button class="chip" data-filter="prizm">Panini Prizm</button>
      <button class="chip" data-filter="cameo">Cameos</button>
    </div>

    <p class="empty-note" hidden>nothing here yet — these cards are coming soon.</p>

    <div class="card-grid">

      <figure class="card scan" data-full="images/cards/full/2006-topps-turkey-red-40.jpg">
        <img class="card-img" src="images/cards/thumbs/2006-topps-turkey-red-40.jpg"
             alt="2006-07 Topps Turkey Red #40 Shaquille O'Neal, Miami Heat — front and back" loading="lazy">
        <figcaption>
          <strong>2006-07 Topps Turkey Red #40</strong>
          <span>Miami Heat · gray-border base</span>
        </figcaption>
      </figure>

      <figure class="card scan" data-cats="prizm" data-full="images/cards/full/2022-prizm-297-fb-blue.jpg">
        <img class="card-img" src="images/cards/thumbs/2022-prizm-297-fb-blue.jpg"
             alt="2022-23 Panini Prizm #297 Shaquille O'Neal, Fast Break Blue parallel numbered 098 of 150 — front and back" loading="lazy">
        <figcaption>
          <strong>2022-23 Panini Prizm #297</strong>
          <span>Fast Break Blue · <em class="mark-note">98/150</em></span>
        </figcaption>
      </figure>

      <figure class="card scan" data-full="images/cards/full/2023-obsidian-10-reggae.jpg">
        <img class="card-img" src="images/cards/thumbs/2023-obsidian-10-reggae.jpg"
             alt="2023-24 Panini Obsidian #10 Shaquille O'Neal, Electric Etch Reggae Flood parallel numbered 33 of 75 — front and back" loading="lazy">
        <figcaption>
          <strong>2023-24 Panini Obsidian #10</strong>
          <span>Electric Etch Reggae Flood · <em class="mark-note">33/75</em></span>
        </figcaption>
      </figure>

      <figure class="card scan" data-full="images/cards/full/2024-court-kings-aim-jade.jpg">
        <img class="card-img" src="images/cards/thumbs/2024-court-kings-aim-jade.jpg"
             alt="2024-25 Panini Court Kings Artistry in Motion #22 Shaquille O'Neal, Jade parallel numbered 39 of 49 — front and back" loading="lazy">
        <figcaption>
          <strong>2024-25 Court Kings · Artistry in Motion #22</strong>
          <span>Jade · <em class="mark-note">39/49</em></span>
        </figcaption>
      </figure>

      <figure class="card scan" data-cats="graded" data-full="images/cards/full/1994-emotion-ntense-psa9.jpg">
        <img class="card-img" src="images/cards/thumbs/1994-emotion-ntense-psa9.jpg"
             alt="1994-95 SkyBox Emotion N-Tense #7 Shaquille O'Neal in a PSA 9 Mint graded slab — front and back" loading="lazy">
        <figcaption>
          <strong>1994-95 SkyBox Emotion · N-Tense #7</strong>
          <span>Orlando Magic · <em class="mark-note">PSA 9 Mint</em></span>
        </figcaption>
      </figure>

      <figure class="card scan" data-cats="oddball" data-full="images/cards/full/1994-stadium-club-master-photo.jpg">
        <img class="card-img" src="images/cards/thumbs/1994-stadium-club-master-photo.jpg"
             alt="1994-95 Topps Stadium Club Master Photo #6 Shaquille O'Neal, 5 by 7 inch jumbo — front and back" loading="lazy">
        <figcaption>
          <strong>1994-95 Stadium Club · Master Photo #6</strong>
          <span>5&times;7 jumbo · <em class="mark-note">oddball</em></span>
        </figcaption>
      </figure>

      <figure class="card scan" data-cats="oddball international" data-full="images/cards/full/1993-mvp-basket-allstar.jpg">
        <img class="card-img" src="images/cards/thumbs/1993-mvp-basket-allstar.jpg"
             alt="1993-94 MVP Basket Mon Vrai Pote All-Star insert of Shaquille O'Neal, French 10 by 24 centimeter jumbo" loading="lazy">
        <figcaption>
          <strong>1993-94 MVP Basket · "Mon Vrai Pote"</strong>
          <span>French jumbo, 10&times;24&nbsp;cm · <em class="mark-note">oddball</em></span>
        </figcaption>
      </figure>

    </div>

  </main>
